<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} — {% endif %}The Garrison · garrison.alvidscriptorium.com</title>

  <meta name="description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:site_name" content="The Garrison — Alvid Scriptorium">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="{% if page.layout == 'paper' or page.layout == 'brief' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — The Garrison{% else %}The Garrison · Pakistan · Ideology · Strategy{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "{{ site.url }}/#website",
        "url": "{{ site.url }}/",
        "name": "The Garrison",
        "description": "{{ site.description | strip_newlines | strip }}",
        "inLanguage": "en-US",
        "isPartOf": {
          "@type": "WebSite",
          "@id": "https://alvidscriptorium.com/#website"
        },
        "publisher": { "@id": "{{ site.url }}/#publisher" }
      },
      {
        "@type": "Organization",
        "@id": "{{ site.url }}/#publisher",
        "name": "The Garrison",
        "url": "{{ site.url }}",
        "parentOrganization": {
          "@type": "Organization",
          "name": "Alvid Scriptorium",
          "url": "https://alvidscriptorium.com"
        },
        "founder": {
          "@type": "Person",
          "name": "Saad Khizar Bosal",
          "identifier": {
            "@type": "PropertyValue",
            "propertyID": "https://registry.identifiers.org/registry/orcid",
            "value": "0009-0004-9944-7378",
            "url": "https://orcid.org/0009-0004-9944-7378"
          }
        }
      }
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/garrison.css' | relative_url }}">
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
</body>
</html>

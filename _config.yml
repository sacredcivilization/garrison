title: "The Garrison"
tagline: "Pakistan · Khorasan · Intizār"
description: >
  A strategic studies publication from the Alvid Scriptorium ecosystem.
  Documents Pakistan's institutions — judiciary, politics, hybrid warfare,
  army doctrine — as the terrain where the Khorasan signs are converging,
  not as a civilization-state to be entrenched. The Khorasan narrative
  read as an interim sign, not a permanent strategic doctrine.
url: "https://garrison.alvidscriptorium.com"
baseurl: ""

author:
  name: Saad Khizar Bosal
  title: Research Architect — Alvid Scriptorium
  orcid: "0009-0004-9944-7378"
  location: Mandi Bahauddin, Punjab, Pakistan

lang: en
timezone: Asia/Karachi

# Site identity
site_series:
  ideology: "Pillar I — Ideological Foundations"
  judiciary: "Pillar II — Judiciary as Ideological Battlefield"
  politics: "Pillar III — Politics & Establishment"
  hybrid_war: "Pillar IV — Hybrid Warfare"
  counter: "Pillar V — Counter-Narratives"
  khorasan: "Pillar VI — The Khorasan Frame"

plugins: []

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/
